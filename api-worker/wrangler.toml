name = "blog-api-worker"
main = "src/index.ts"
compatibility_date = "2024-07-01"

# 仅唯一Hyperdrive：只读 zmzaxgIndex
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "7d7f1fb08aaa4703a351120a6d6ab8cb"

# 公开环境变量
[vars]
R2_DOMAIN = "你的R2图片公开域名"

# 加密密钥（后台填入机密，不要写死）
[[secrets]]
name = "JWT_SECRET"

# 定时任务：每小时清理过期缓存/验证码、刷新容量统计
[triggers.crons]
cron = ["0 * * * *"]