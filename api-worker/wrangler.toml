name = "blog-full-worker"
main = "src/index.ts"
compatibility_date = "2024-07-01"

# 唯一Hyperdrive：只读 zmzaxgIndex
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "7d7f1fb08aaa4703a351120a6d6ab8cb"

# 无R2_DOMAIN环境变量，全部移除

# JWT加密密钥（后台机密填入）
[[secrets]]
name = "JWT_SECRET"

# 每小时定时清理缓存、验证码、刷新容量统计
[triggers.crons]
cron = ["0 * * * *"]